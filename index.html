<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesor Panini  prueba</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✦</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ffffff; --border: #333333; --bg: #0a0a0a; 
            --sidebar: #111111; --text: #f1f1f1; --accent: #8d7b6d;
            --gold: #ffd700; --danger: #ff5252;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex;
            align-items: center; justify-content: center;
        }
        .login-card {
            background: #151515; padding: 40px; border-radius: 15px;
            border: 1px solid var(--border); text-align: center; width: 90%; max-width: 350px;
        }

        aside { 
            width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); 
            padding: 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; 
        }
        
        main { flex: 1; margin-left: 260px; padding: 40px; display: none; }

        .nav-item { 
            padding: 15px; cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; 
            text-transform: uppercase; color: var(--text); opacity: 0.5; border-left: 2px solid transparent;
            margin-bottom: 5px;
        }
        .nav-item.active { opacity: 1; font-weight: bold; border-left: 2px solid var(--accent); background: rgba(255,255,255,0.02); }

        .card { background: #151515; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; border-radius: 12px; }
        .btn { 
            padding: 12px 20px; background: var(--accent); color: white; border: none; 
            cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; 
            font-weight: bold; border-radius: 4px; width: 100%;
        }
        .btn:hover { filter: brightness(1.2); }
        
        input, select { 
            width: 100%; padding: 12px; margin-top: 10px; border: 1px solid var(--border); 
            background: #1a1a1a; color: white; font-family: inherit; border-radius: 6px;
        }
        
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .star-display { color: var(--gold); font-size: 1.2rem; margin-bottom: 5px; }
        .badge { font-size: 0.6rem; background: var(--accent); padding: 3px 8px; border-radius: 10px; margin-left: 10px; color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="font-family: 'Cormorant Garamond'; color: var(--accent); margin-bottom: 20px; letter-spacing: 2px;">PANEL ASESOR</h2>
            <input type="password" id="admin-pin" placeholder="••••••" style="text-align: center; font-size: 1.5rem; letter-spacing: 8px;">
            <button class="btn" style="margin-top: 25px;" onclick="checkPin()">AUTENTICAR</button>
        </div>
    </div>

    <aside id="admin-sidebar" style="display: none;">
        <div style="margin-bottom: 40px; text-align: center; padding-top: 20px;">
            <h2 style="font-family: 'Cormorant Garamond'; letter-spacing: 4px; color: var(--accent);">MOWI ADVISOR</h2>
        </div>
        <div class="nav-item active" onclick="app.setTab('precios', this)">💰 CONTROL DE PRECIOS</div>
        <div class="nav-item" onclick="app.setTab('especiales', this)">⭐ CARTAS EN STOCK</div>
        <div class="nav-item" onclick="app.setTab('pedidos', this)">📦 PEDIDOS CLIENTE</div>
        <div class="nav-item" onclick="app.setTab('mejoras', this)">📈 RESEÑAS RECIBIDAS</div>
        
        <div style="margin-top: auto; padding-bottom: 20px;">
            <div class="nav-item" onclick="location.reload()" style="color: var(--danger); opacity: 1;">CERRAR SESIÓN</div>
        </div>
    </aside>

    <main id="admin-main">
        <section id="tab-precios" class="section active">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 2.2rem; margin-bottom: 10px;">Gestión de Tarifas</h2>
            <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 30px;">Edita los valores globales de la tienda.</p>
            <div class="card">
                <div id="price-inputs">
                    <p style="text-align: center; opacity: 0.5;">Cargando base de datos...</p>
                </div>
                <button class="btn" style="margin-top: 20px;" onclick="app.savePrices()">ACTUALIZAR TODO</button>
            </div>
        </section>

        <section id="tab-especiales" class="section">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 2.2rem; margin-bottom: 10px;">Inventario Especial</h2>
            <div class="card">
                <h4 style="font-size: 0.7rem; color: var(--accent);">NUEVA CARTA</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="c_name" placeholder="Nombre">
                    <select id="c_rarity">
                        <option value="Oro">Oro</option>
                        <option value="Plata">Plata</option>
                        <option value="Legendaria">Legendaria</option>
                    </select>
                </div>
                <input type="number" id="c_price" placeholder="Precio (Q)">
                <input type="number" id="c_stock" placeholder="Stock">
                <button class="btn" style="margin-top: 15px;" onclick="app.addSpecial()">PUBLICAR</button>
            </div>
            <div id="list-especiales"></div>
        </section>

        <section id="tab-pedidos" class="section">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 2.2rem; margin-bottom: 10px;">Pedidos</h2>
            <div id="list-pedidos"></div>
        </section>

        <section id="tab-mejoras" class="section">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 2.2rem; margin-bottom: 10px;">Reseñas de Clientes</h2>
            <div id="list-feedback"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUdS0Gzfks0hQJCqTevtz5O2MFlRiHga4",
            authDomain: "tiendaskin-bccba.firebaseapp.com",
            projectId: "tiendaskin-bccba",
            storageBucket: "tiendaskin-bccba.firebasestorage.app",
            messagingSenderId: "280193902268",
            appId: "1:280193902268:web:743d0e2172641be7a292b9"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);

        window.checkPin = function() {
            const pin = document.getElementById('admin-pin').value;
            if(pin === "123456") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-sidebar').style.display = 'flex';
                document.getElementById('admin-main').style.display = 'block';
                app.init();
            } else {
                alert("PIN INCORRECTO");
            }
        };

        window.app = {
            setTab(t, el) {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('tab-'+t).classList.add('active');
                el.classList.add('active');
            },

            // --- PRECIOS (Corregido el guardado) ---
            initPrices() {
                onSnapshot(doc(db, "config", "precios"), (snap) => {
                    if(snap.exists()) {
                        const data = snap.data();
                        document.getElementById('price-inputs').innerHTML = Object.entries(data).map(([key, val]) => `
                            <div style="margin-bottom:10px;">
                                <label style="font-size:0.6rem; color:var(--accent);">${key.toUpperCase()}</label>
                                <input type="number" class="price-edit-input" data-key="${key}" value="${val}">
                            </div>
                        `).join('');
                    }
                });
            },

            async savePrices() {
                const updates = {};
                document.querySelectorAll('.price-edit-input').forEach(input => {
                    updates[input.dataset.key] = parseFloat(input.value);
                });
                try {
                    await setDoc(doc(db, "config", "precios"), updates);
                    alert("✅ Precios actualizados en la base de datos.");
                } catch (e) { console.error(e); }
            },

            // --- RESEÑAS (Corregido el visualizador) ---
            initFeedback() {
                onSnapshot(collection(db, "mejoras"), (snap) => {
                    const container = document.getElementById('list-feedback');
                    if (snap.empty) {
                        container.innerHTML = "<p style='opacity:0.5'>No hay reseñas aún.</p>";
                        return;
                    }
                    container.innerHTML = snap.docs.map(d => {
                        const r = d.data();
                        return `
                        <div class="card">
                            <div class="star-display">${'★'.repeat(r.rating || 0)}${'☆'.repeat(5-(r.rating || 0))}</div>
                            <p>"${r.comment || 'Sin comentario'}"</p>
                            <small style="opacity:0.5; display:block; margin-top:10px;">
                                Por: ${r.user || 'Anónimo'} | ${r.date || ''}
                            </small>
                            <button onclick="app.deleteDoc('mejoras','${d.id}')" style="color:var(--danger); background:none; border:none; font-size:0.6rem; cursor:pointer; margin-top:10px;">ELIMINAR</button>
                        </div>`;
                    }).join('');
                });
            },

            // --- PEDIDOS ---
            initOrders() {
                onSnapshot(collection(db, "pedidos"), (snap) => {
                    document.getElementById('list-pedidos').innerHTML = snap.docs.map(d => {
                        const p = d.data();
                        const color = p.status === 'pendiente' ? '#ff9800' : '#4caf50';
                        return `
                        <div class="card" style="border-left: 4px solid ${color}">
                            <strong>${p.name}</strong> <span class="badge">${p.status}</span>
                            <p style="font-size:0.8rem; margin:10px 0;">${p.details}</p>
                            <select onchange="app.updateStatus('${d.id}', this.value)" style="margin:0; padding:5px;">
                                <option value="pendiente" ${p.status==='pendiente'?'selected':''}>Pendiente</option>
                                <option value="entregado" ${p.status==='entregado'?'selected':''}>Entregado</option>
                            </select>
                            <button onclick="app.deleteDoc('pedidos','${d.id}')" style="color:var(--danger); background:none; border:none; margin-left:15px; cursor:pointer;">Borrar</button>
                        </div>`;
                    }).reverse().join('');
                });
            },

            async addSpecial() {
                const name = document.getElementById('c_name').value;
                const rarity = document.getElementById('c_rarity').value;
                const price = parseFloat(document.getElementById('c_price').value);
                const stock = parseInt(document.getElementById('c_stock').value);
                if(name && price) {
                    await addDoc(collection(db, "especiales"), { name, rarity, price, stock });
                    alert("Carta añadida.");
                }
            },

            async updateStatus(id, s) { await updateDoc(doc(db, "pedidos", id), { status: s }); },
            async deleteDoc(col, id) { if(confirm("¿Seguro?")) await deleteDoc(doc(db, col, id)); },

            init() {
                this.initPrices();
                this.initFeedback();
                this.initOrders();
                // Monitor Stock Especial
                onSnapshot(collection(db, "especiales"), (snap) => {
                    document.getElementById('list-especiales').innerHTML = snap.docs.map(d => `
                        <div class="card" style="display:flex; justify-content:space-between;">
                            <span>${d.data().name} (Q${d.data().price})</span>
                            <button onclick="app.deleteDoc('especiales','${d.id}')" style="color:var(--danger); background:none; border:none; cursor:pointer;">QUITAR</button>
                        </div>
                    `).join('');
                });
            }
        };
    </script>
</body>
</html>
