<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANINI | MUNDIAL 2026 OFFICIAL COLLECTION</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fifa-blue: #004b87;
            --fifa-gold: #c6a15a;
            --fifa-green: #008f4c;
            --white: #ffffff;
            --bg: #f4f7f6;
            --text: #1a1a1a;
            --border: #dee2e6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); }

        #app { max-width: 600px; margin: 0 auto; background: var(--white); min-height: 100vh; display: none; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
        
        /* Header Temático */
        header { 
            padding: 1.5rem; 
            text-align: center; 
            background: var(--fifa-blue); 
            color: white;
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .brand { font-family: 'Oswald', sans-serif; font-size: 1.5rem; letter-spacing: 2px; font-weight: 700; }

        main { flex: 1; padding: 1.5rem; }
        h2 { font-family: 'Oswald', sans-serif; font-size: 1.8rem; margin-bottom: 1rem; text-transform: uppercase; color: var(--fifa-blue); }

        /* Estilos de Botones */
        .btn { 
            display: block; width: 100%; padding: 1rem; 
            background: var(--fifa-green); color: white; 
            border: none; border-radius: 8px;
            font-weight: 700; text-transform: uppercase; 
            cursor: pointer; margin-top: 1rem; transition: 0.3s;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn-gold { background: var(--fifa-gold); }
        .btn-ghost { background: transparent; border: 2px solid var(--fifa-blue); color: var(--fifa-blue); }

        /* Tarjetas de Álbum */
        .album-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .album-card.hardcover { border-left: 8px solid var(--fifa-gold); }
        .badge {
            position: absolute; top: 10px; right: 10px;
            background: var(--fifa-gold); color: white;
            padding: 4px 8px; font-size: 0.7rem; border-radius: 4px; font-weight: bold;
        }

        /* Rejilla de Estampitas */
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 1rem;
        }
        .sticker-item {
            aspect-ratio: 2/3;
            background: #eee;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .sticker-item.collected { background: var(--fifa-green); color: white; }
        .sticker-item.repeated { border-color: var(--fifa-gold); background: #e3f2fd; }

        /* Barra de Progreso */
        .progress-container {
            background: #eee; height: 10px; border-radius: 5px; margin: 10px 0;
        }
        .progress-bar {
            height: 100%; background: var(--fifa-green); border-radius: 5px; transition: width 0.5s;
        }

        /* Pantalla de Inicio */
        #login-screen {
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; color: white; text-align: center; padding: 2rem;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-family:'Oswald'; font-size:3rem; margin-bottom:0.5rem;">COLECCIÓN 2026</h1>
        <p style="margin-bottom:2rem; font-weight:300; letter-spacing:1px;">Gestiona tus estampitas oficiales del Mundial</p>
        <button class="btn btn-gold" style="width:250px;" onclick="initApp()">Mi Álbum Digital</button>
        <button class="btn btn-ghost" style="width:250px; border-color:white; color:white; margin-top:1rem;" onclick="app.setStep('catalog')">Comprar Físico</button>
    </div>

    <div id="app">
        <header>
            <div class="brand" onclick="location.reload()">FIFA WORLD CUP 2026</div>
        </header>
        <main id="stage"></main>
    </div>

    <script type="module">
        // Simulación de Base de Datos para escalabilidad
        const DB_MOCK = {
            products: [
                { id: 'alb_std', name: 'Álbum Normal', price: 15, type: 'Softcover', desc: 'Edición clásica en papel brillante.' },
                { id: 'alb_hard', name: 'Álbum Empastado', price: 45, type: 'Hardcover', desc: 'Edición de lujo para coleccionistas, tapa rígida y acabados dorados.' }
            ],
            teams: ['México', 'USA', 'Canadá', 'Argentina', 'España', 'Brasil']
        };

        window.app = {
            state: {
                step: 'intro',
                collection: JSON.parse(localStorage.getItem('cup_2026_coll')) || {}, // ID de estampita: estado (1: pegada, 2: repetida)
                albumType: 'hardcover'
            },

            init() {
                this.render();
            },

            setStep(s) {
                this.state.step = s;
                this.render();
            },

            toggleSticker(id) {
                // Lógica de ciclo: No la tengo -> La tengo -> Repetida -> No la tengo
                const current = this.state.collection[id] || 0;
                const next = (current + 1) % 3;
                if(next === 0) delete this.state.collection[id];
                else this.state.collection[id] = next;
                
                localStorage.setItem('cup_2026_coll', JSON.stringify(this.state.collection));
                this.render();
            },

            render() {
                const stage = document.getElementById('stage');
                stage.innerHTML = '';

                if(this.state.step === 'catalog') {
                    stage.innerHTML = `<h2>Elige tu Álbum</h2>`;
                    DB_MOCK.products.forEach(p => {
                        stage.innerHTML += `
                            <div class="album-card ${p.type.toLowerCase()}">
                                ${p.type === 'Hardcover' ? '<span class="badge">PREMIUM</span>' : ''}
                                <h3>${p.name}</h3>
                                <p style="font-size:0.9rem; margin:0.5rem 0;">${p.desc}</p>
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1rem;">
                                    <strong style="font-size:1.2rem;">$${p.price}</strong>
                                    <button class="btn btn-gold" style="width:auto; padding:0.5rem 1rem;" onclick="alert('Redirigiendo a Tienda...')">Comprar</button>
                                </div>
                            </div>
                        `;
                    });
                    stage.innerHTML += `<button class="btn btn-ghost" onclick="app.setStep('intro')">Ver mi Progreso</button>`;
                }

                else if(this.state.step === 'intro') {
                    const totalStickers = 100; // Simplificado para el ejemplo
                    const collected = Object.values(this.state.collection).filter(v => v >= 1).length;
                    const percent = Math.round((collected / totalStickers) * 100);

                    stage.innerHTML = `
                        <div class="tracker-card" style="margin-bottom:2rem;">
                            <h2>Mi Colección</h2>
                            <p>Progreso General: <strong>${percent}%</strong></p>
                            <div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div>
                            <p style="font-size:0.8rem; color:#666;">Faltan: ${totalStickers - collected} estampitas</p>
                        </div>
                        
                        <h3>Estampitas por Selección</h3>
                        <div class="sticker-grid">
                            ${Array.from({length: 12}).map((_, i) => {
                                const id = `ST-${i+1}`;
                                const status = this.state.collection[id] || 0;
                                let label = id;
                                if(status === 2) label = 'REPETIDA';
                                
                                return `
                                    <div class="sticker-item ${status >= 1 ? 'collected' : ''} ${status === 2 ? 'repeated' : ''}" 
                                         onclick="app.toggleSticker('${id}')">
                                        ${status === 2 ? '🔄' : id}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <p style="margin-top:1rem; font-size:0.7rem; text-align:center; color:gray;">Toca una casilla para cambiar estado: <br> Vacío → Obtenida → Repetida</p>
                        <button class="btn" style="margin-top:2rem;" onclick="app.setStep('catalog')">Ver Otros Productos</button>
                    `;
                }
            }
        };

        window.initApp = () => {
            document.getElementById('login-screen').style.display='none';
            document.getElementById('app').style.display='flex';
            app.init();
        };
    </script>
</body>
</html>
