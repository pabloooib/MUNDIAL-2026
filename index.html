<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesor Panini 2026 - Master Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ffffff; --border: #333333; --bg: #0a0a0a; 
            --sidebar: #111111; --text: #f1f1f1; --accent: #8d7b6d;
            --gold: #ffd700; --danger: #ff5252;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        /* Login */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #151515; padding: 40px; border-radius: 15px; border: 1px solid var(--border); text-align: center; width: 320px; }

        /* Sidebar */
        aside { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: none; flex-direction: column; position: fixed; height: 100vh; }
        main { flex: 1; margin-left: 260px; padding: 40px; display: none; }

        .nav-item { padding: 15px; cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text); opacity: 0.5; margin-bottom: 5px; border-left: 2px solid transparent; }
        .nav-item.active { opacity: 1; font-weight: bold; border-left: 2px solid var(--accent); background: rgba(255,255,255,0.02); }

        .card { background: #151515; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; border-radius: 10px; }
        .btn { padding: 12px; background: var(--accent); color: white; border: none; cursor: pointer; font-size: 0.7rem; font-weight: bold; border-radius: 4px; width: 100%; transition: 0.3s; }
        .btn:hover { filter: brightness(1.2); }
        
        input, select { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid var(--border); background: #1a1a1a; color: white; border-radius: 5px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #222; }
        .badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="font-family: 'Cormorant Garamond'; color: var(--accent); margin-bottom: 20px;">PANEL ASESOR</h2>
            <input type="password" id="admin-pin" placeholder="PIN" style="text-align: center;">
            <button class="btn" style="margin-top: 20px;" onclick="checkPin()">ENTRAR</button>
        </div>
    </div>

    <aside id="admin-sidebar">
        <h2 style="font-family: 'Cormorant Garamond'; color: var(--accent); text-align: center; margin-bottom: 30px;">MOWI ADMIN</h2>
        <div class="nav-item active" onclick="app.setTab('precios', this)">💰 LISTA DE PRECIOS</div>
        <div class="nav-item" onclick="app.setTab('tienda', this)">🏪 TIENDA ESPECIAL</div>
        <div class="nav-item" onclick="app.setTab('pedidos', this)">📦 PEDIDOS</div>
        <div class="nav-item" onclick="app.setTab('mejoras', this)">📈 RESEÑAS</div>
        <div style="margin-top: auto;"><div class="nav-item" onclick="location.reload()" style="color:var(--danger)">CERRAR SESIÓN</div></div>
    </aside>

    <main id="admin-main">
        <section id="tab-precios" class="section active">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 2rem;">Lista de Precios Fijos</h2>
            <p style="opacity:0.5; font-size:0.8rem; margin-bottom:20px;">Precios de sobres y servicios básicos.</p>
            <div class="card" id="price-editor-container">
                <div id="price-inputs">Cargando datos...</div>
                <button class="btn" onclick="app.savePrices()">GUARDAR CAMBIOS</button>
            </div>
        </section>

        <section id="tab-tienda" class="section">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 2rem;">Inventario de Tienda</h2>
            <div class="card">
                <input type="text" id="t_name" placeholder="Nombre de la Carta">
                <input type="number" id="t_price" placeholder="Precio Q">
                <button class="btn" style="margin-top:10px;" onclick="app.addStoreItem()">AÑADIR A TIENDA</button>
            </div>
            <div id="list-store"></div>
        </section>

        <section id="tab-pedidos" class="section">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 2rem;">Pedidos Recientes</h2>
            <div id="list-pedidos" style="margin-top:20px;"></div>
        </section>

        <section id="tab-mejoras" class="section">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 2rem;">Reseñas</h2>
            <div id="list-feedback" style="margin-top:20px;"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUdS0Gzfks0hQJCqTevtz5O2MFlRiHga4",
            authDomain: "tiendaskin-bccba.firebaseapp.com",
            projectId: "tiendaskin-bccba",
            storageBucket: "tiendaskin-bccba.firebasestorage.app",
            messagingSenderId: "280193902268",
            appId: "1:280193902268:web:743d0e2172641be7a292b9"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);

        window.checkPin = function() {
            if(document.getElementById('admin-pin').value === "123456") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-sidebar').style.display = 'flex';
                document.getElementById('admin-main').style.display = 'block';
                app.init();
            } else { alert("PIN Inválido"); }
        };

        window.app = {
            setTab(t, el) {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('tab-'+t).classList.add('active');
                el.classList.add('active');
            },

            // 1. LISTA DE PRECIOS
            initPrices() {
                onSnapshot(doc(db, "config", "precios"), (snap) => {
                    if(snap.exists()) {
                        const data = snap.data();
                        document.getElementById('price-inputs').innerHTML = Object.entries(data).map(([k, v]) => `
                            <div class="price-row">
                                <label style="font-size:0.7rem">${k}</label>
                                <input type="number" class="p-input" data-key="${k}" value="${v}" style="width:100px; margin:0">
                            </div>
                        `).join('');
                    }
                });
            },

            async savePrices() {
                const data = {};
                document.querySelectorAll('.p-input').forEach(i => data[i.dataset.key] = parseFloat(i.value));
                await setDoc(doc(db, "config", "precios"), data);
                alert("Precios base actualizados");
            },

            // 2. TIENDA DE CARTAS
            initStore() {
                onSnapshot(collection(db, "especiales"), (snap) => {
                    document.getElementById('list-store').innerHTML = snap.docs.map(d => `
                        <div class="card" style="display:flex; justify-content:space-between">
                            <span>${d.data().name} - <b>Q${d.data().price}</b></span>
                            <button onclick="app.del('especiales','${d.id}')" style="color:var(--danger); background:none; border:none; cursor:pointer">Quitar</button>
                        </div>
                    `).join('');
                });
            },

            async addStoreItem() {
                const name = document.getElementById('t_name').value;
                const price = parseFloat(document.getElementById('t_price').value);
                if(name && price) {
                    await addDoc(collection(db, "especiales"), { name, price });
                    document.getElementById('t_name').value = "";
                    document.getElementById('t_price').value = "";
                }
            },

            // 3. PEDIDOS (Sincronización Crítica)
            initOrders() {
                onSnapshot(collection(db, "pedidos"), (snap) => {
                    const list = document.getElementById('list-pedidos');
                    if(snap.empty) { list.innerHTML = "No hay pedidos."; return; }
                    list.innerHTML = snap.docs.map(d => {
                        const p = d.data();
                        return `
                        <div class="card" style="border-left: 4px solid ${p.status === 'pendiente' ? 'orange' : 'green'}">
                            <div style="display:flex; justify-content:space-between">
                                <b>${p.name}</b>
                                <span class="badge" style="background:${p.status === 'pendiente' ? 'orange' : 'green'}">${p.status}</span>
                            </div>
                            <p style="font-size:0.8rem; margin:10px 0">${p.details}</p>
                            <div style="display:flex; gap:10px">
                                <button class="btn" style="background:#444" onclick="app.updStatus('${d.id}','entregado')">MARCAR ENTREGADO</button>
                                <button class="btn" style="background:none; border:1px solid var(--danger); color:var(--danger)" onclick="app.del('pedidos','${d.id}')">BORRAR</button>
                            </div>
                        </div>`;
                    }).reverse().join('');
                });
            },

            // 4. RESEÑAS
            initFeedback() {
                onSnapshot(collection(db, "mejoras"), (snap) => {
                    const list = document.getElementById('list-feedback');
                    list.innerHTML = snap.docs.map(d => `
                        <div class="card">
                            <div style="color:var(--gold)">${'★'.repeat(d.data().rating)}</div>
                            <p style="font-style:italic">"${d.data().comment}"</p>
                            <small>- ${d.data().user}</small>
                            <button onclick="app.del('mejoras','${d.id}')" style="display:block; color:var(--danger); background:none; border:none; margin-top:10px; cursor:pointer">Eliminar</button>
                        </div>
                    `).join('');
                });
            },

            async updStatus(id, s) { await updateDoc(doc(db, "pedidos", id), { status: s }); },
            async del(c, id) { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, c, id)); },

            init() {
                this.initPrices();
                this.initStore();
                this.initOrders();
                this.initFeedback();
            }
        };
    </script>
</body>
</html>
