<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, doc, collection, onSnapshot, setDoc, addDoc, deleteDoc, updateDoc } from "firebase/firestore";

    // Configuración idéntica de tu Firebase original
    const firebaseConfig = {
        apiKey: "AIzaSyCUdS0Gzfks0hQJCqTevtz5O2MFlRiHga4",
        authDomain: "tiendaskin-bccba.firebaseapp.com",
        projectId: "tiendaskin-bccba",
        storageBucket: "tiendaskin-bccba.firebasestorage.app",
        messagingSenderId: "280193902268",
        appId: "1:280193902268:web:743d0e2172641be7a292b9"
    };

    const fApp = initializeApp(firebaseConfig);
    const db = getFirestore(fApp);

    // --- ENLAZAR EVENTOS AL ÁMBITO GLOBAL (window) ---

    // Seguridad Básica de Acceso al Panel
    window.checkPin = function() {
        const pin = document.getElementById('admin-pin').value;
        if(pin === "123456") { // Puedes cambiar tu PIN maestro aquí
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            adminApp.startEngine();
        } else {
            alert("PIN Inválido. Inténtalo de nuevo.");
        }
    };

    // Manejo de Navegación de Vistas Internas
    window.switchView = function(viewId, element) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('aside .nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        element.classList.add('active');
    };

    // Objeto de Operaciones Reactivas de Administración
    window.adminApp = {
        
        // 1. ESCUCHA Y ESCRITURA DE PRECIOS BASE
        listenPrices() {
            onSnapshot(doc(db, "config", "precios"), (snap) => {
                const box = document.getElementById('container-precios-base');
                if(snap.exists()) {
                    const precios = snap.data();
                    box.innerHTML = Object.entries(precios).map(([tipo, valor]) => `
                        <div class="price-row">
                            <span style="font-weight:600; font-size:0.95rem;">${tipo}</span>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <span style="opacity:0.4; font-weight:600;">Q</span>
                                <input type="number" class="val-input" data-key="${tipo}" value="${valor}" step="0.01" style="width:120px; margin:0; text-align:center; font-weight:bold; color:var(--wc-cyan); border-radius:10px; padding:8px;">
                            </div>
                        </div>
                    `).join('');
                } else {
                    box.innerHTML = `<p style="opacity:0.5;">No hay configuración de precios base en el servidor.</p>`;
                }
            });
        },

        async savePrices() {
            try {
                const dataActualizada = {};
                document.querySelectorAll('.val-input').forEach(inp => {
                    dataActualizada[inp.dataset.key] = parseFloat(inp.value) || 0;
                });
                await setDoc(doc(db, "config", "precios"), dataActualizada);
                alert("¡Precios base actualizados! Se aplicarán al instante a todos los usuarios.");
            } catch (err) {
                alert("Error guardando cambios en la nube: " + err.message);
            }
        },

        // 2. CONTROL DE CATÁLOGO DE LEYENDAS ESPECIALES
        listenLegends() {
            onSnapshot(collection(db, "especiales"), (snap) => {
                const container = document.getElementById('container-leyendas-list');
                if(snap.empty) {
                    container.innerHTML = `<p style="opacity:0.4; font-style:italic; padding:15px 0;">No hay cartas especiales listadas actualmente.</p>`;
                    return;
                }
                container.innerHTML = snap.docs.map(docSnap => {
                    const item = docSnap.data();
                    return `
                        <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:20px; margin-bottom:12px; border-color:rgba(255,255,255,0.02); background: rgba(0,0,0,0.2);">
                            <div>
                                <h4 style="font-family:'Oswald'; color:var(--gold); font-size:1.2rem; text-transform:uppercase;">${item.name}</h4>
                                <p style="font-size:0.9rem; color:var(--wc-cyan); font-weight:600;">Q${parseFloat(item.price).toFixed(2)}</p>
                            </div>
                            <button class="btn btn-danger" style="width:auto; padding:8px 15px; font-size:0.75rem;" onclick="adminApp.removeLegend('${docSnap.id}')"><i class="fa-solid fa-trash"></i> Eliminar</button>
                        </div>
                    `;
                }).join('');
            });
        },

        async addLegend() {
            const nameInp = document.getElementById('legend-name');
            const priceInp = document.getElementById('legend-price');
            const name = nameInp.value.trim();
            const price = parseFloat(priceInp.value);

            if(name && !isNaN(price)) {
                try {
                    await addDoc(collection(db, "especiales"), { name, price });
                    nameInp.value = "";
                    priceInp.value = "";
                } catch(e) { alert("Error al subir: " + e.message); }
            } else {
                alert("Completa todos los campos con valores correctos.");
            }
        },

        async removeLegend(id) {
            if(confirm("¿Eliminar de forma permanente esta carta de la tienda del usuario?")) {
                await deleteDoc(doc(db, "especiales", id));
            }
        },

        // 3. MONITOR LOGÍSTICO DE PEDIDOS EN COLA
        listenOrders() {
            onSnapshot(collection(db, "pedidos"), (snap) => {
                const box = document.getElementById('container-pedidos-list');
                if(snap.empty) {
                    box.innerHTML = `<p style="opacity:0.4; padding:20px 0;">Esperando solicitudes de clientes...</p>`;
                    return;
                }
                box.innerHTML = snap.docs.map(docSnap => {
                    const pedido = docSnap.data();
                    const isPendiente = pedido.status === 'pendiente';
                    return `
                        <div class="card order-card ${isPendiente ? 'pendiente' : ''}" style="background: ${isPendiente ? 'rgba(255, 215, 0, 0.02)' : 'rgba(0, 229, 255, 0.01)'};">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                <h4 style="font-family:'Oswald'; font-size:1.3rem;">${pedido.name || 'Usuario SOUVREIGN'}</h4>
                                <span class="badge" style="background:${isPendiente ? 'rgba(255,215,0,0.15)' : 'rgba(0,229,255,0.15)'}; color:${isPendiente ? '#ffd700' : '#00e5ff'};">
                                    ${pedido.status}
                                </span>
                            </div>
                            <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:12px; font-size:0.85rem; line-height:1.6; border:1px solid rgba(255,255,255,0.02); margin-bottom:20px; color:#e2e2e8;">
                                ${pedido.details}
                            </div>
                            <div style="display:flex; gap:10px; justify-content:flex-end;">
                                ${isPendiente ? `<button class="btn" style="width:auto; padding:10px 20px; font-size:0.75rem; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.1);" onclick="adminApp.updateOrderStatus('${docSnap.id}', 'entregado')">COMPLETAR PEDIDO</button>` : ''}
                                <button class="btn btn-danger" style="width:auto; padding:10px 20px; font-size:0.75rem;" onclick="adminApp.deleteOrder('${docSnap.id}')"><i class="fa-solid fa-trash-can"></i> LIMPIAR LOG</button>
                            </div>
                        </div>
                    `;
                }).reverse().join('');
            },

            async updateOrderStatus(id, nuevoEstado) {
                await updateDoc(doc(db, "pedidos", id), { status: nuevoEstado });
            },

            async deleteOrder(id) {
                if(confirm("¿Eliminar permanentemente este registro de pedido del sistema?")) {
                    await deleteDoc(doc(db, "pedidos", id));
                }
            },

            startEngine() {
                this.listenPrices();
                this.listenLegends();
                this.listenOrders();
            }
        };
    </script>
